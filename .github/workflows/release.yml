name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package and release notes
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node for npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Read package version
        id: package
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Check whether version tag already exists
        id: version_tag
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${{ steps.package.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version_tag.outputs.exists != 'true'
        run: bun install --frozen-lockfile

      - name: Run checks
        if: steps.version_tag.outputs.exists != 'true'
        run: bun run check

      - name: Verify package contents
        if: steps.version_tag.outputs.exists != 'true'
        run: npm pack --dry-run

      - name: Publish package to npm
        if: steps.version_tag.outputs.exists != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release notes
        if: steps.version_tag.outputs.exists != 'true'
        run: gh release create "${{ steps.package.outputs.tag }}" --target "$GITHUB_SHA" --title "${{ steps.package.outputs.tag }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
