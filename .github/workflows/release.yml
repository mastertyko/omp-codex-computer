name: Release

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Auto-merge PRs"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package and release notes
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_PR: ${{ github.event.workflow_run.pull_requests[0].number || '' }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            if [ -z "$WORKFLOW_RUN_PR" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "skip_reason=workflow_run had no associated pull request" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            release_sha=""
            for attempt in $(seq 1 60); do
              pr_json=$(gh pr view "$WORKFLOW_RUN_PR" --json state,mergeCommit)
              state=$(node -e 'const data = JSON.parse(process.argv[1]); console.log(data.state ?? "")' "$pr_json")
              merge_sha=$(node -e 'const data = JSON.parse(process.argv[1]); console.log(data.mergeCommit?.oid ?? "")' "$pr_json")

              if [ "$state" = "MERGED" ] && [ -n "$merge_sha" ]; then
                release_sha="$merge_sha"
                break
              fi

              if [ "$state" != "OPEN" ]; then
                echo "skip=true" >> "$GITHUB_OUTPUT"
                echo "skip_reason=pull request state was $state" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              sleep 10
            done

            if [ -z "$release_sha" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "skip_reason=pull request did not merge before release wait timeout" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            release_sha="$PUSH_SHA"
          fi

          git fetch origin main --tags --force
          git checkout "$release_sha"

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"

      - name: Explain skipped release
        if: steps.target.outputs.skip == 'true'
        run: |
          echo "Release skipped: ${{ steps.target.outputs.skip_reason }}"

      - name: Set up Bun
        if: steps.target.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node for npm publishing
        if: steps.target.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Compute next release version
        id: version
        if: steps.target.outputs.skip != 'true'
        env:
          RELEASE_SHA: ${{ steps.target.outputs.release_sha }}
        run: |
          set -euo pipefail
          latest_tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)

          if [ -n "$latest_tag" ]; then
            latest_sha=$(git rev-list -n 1 "$latest_tag")
            latest_parent=$(git rev-parse "${latest_sha}^" 2>/dev/null || true)
            if [ "$latest_sha" = "$RELEASE_SHA" ] || [ "$latest_parent" = "$RELEASE_SHA" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "skip_reason=$latest_tag already releases this commit" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          export LATEST_VERSION="${latest_tag#v}"
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const pkg = require("./package.json");
          const latest = process.env.LATEST_VERSION || "";

          function parse(version) {
            const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(version);
            if (!match) throw new Error(`Unsupported semver version: ${version}`);
            return { major: Number(match[1]), minor: Number(match[2]), patch: Number(match[3]) };
          }

          function compare(left, right) {
            return left.major - right.major || left.minor - right.minor || left.patch - right.patch;
          }

          const packageVersion = parse(pkg.version);
          let next = packageVersion;

          if (latest) {
            const latestVersion = parse(latest);
            if (compare(packageVersion, latestVersion) <= 0) {
              next = { ...latestVersion, patch: latestVersion.patch + 1 };
            }
          }

          const version = `${next.major}.${next.minor}.${next.patch}`;
          console.log(`skip=false`);
          console.log(`version=${version}`);
          console.log(`tag=v${version}`);
          NODE

      - name: Explain already released commit
        if: steps.version.outputs.skip == 'true'
        run: |
          echo "Release skipped: ${{ steps.version.outputs.skip_reason }}"

      - name: Update package version
        if: steps.target.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          pkg.version = process.env.RELEASE_VERSION;
          fs.writeFileSync("package.json", `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Read package metadata
        id: package
        if: steps.target.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check whether npm version already exists
        id: npm_version
        if: steps.target.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.target.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Run checks
        if: steps.target.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: bun run check

      - name: Verify package contents
        if: steps.target.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: npm pack --dry-run

      - name: Commit release version
        id: release_commit
        if: steps.target.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json; then
            release_sha=$(git rev-parse HEAD)
          else
            branch="chore/release-${RELEASE_TAG}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git switch -C "$branch"
            git add package.json
            git commit -m "chore: release $RELEASE_TAG"
            release_sha=$(git rev-parse HEAD)
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:"$branch" --force
          fi

          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"

      - name: Publish package to npm
        if: steps.target.outputs.skip != 'true' && steps.version.outputs.skip != 'true' && steps.npm_version.outputs.exists != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release notes
        if: steps.target.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: gh release create "${{ steps.version.outputs.tag }}" --target "${{ steps.release_commit.outputs.release_sha }}" --title "${{ steps.version.outputs.tag }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
